name: Project Checks

on:
  push:
    branches:
      - main
    paths:
      - "main.py"
      - "config.yaml"
      - "requirements.txt"
      - "tests/**"
      - ".github/workflows/**"
  pull_request:
    paths:
      - "main.py"
      - "config.yaml"
      - "requirements.txt"
      - "tests/**"
      - ".github/workflows/**"

permissions:
  contents: read

jobs:
  smoke-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt

      - name: Run offline smoke tests
        run: python -m unittest discover -s tests -v
