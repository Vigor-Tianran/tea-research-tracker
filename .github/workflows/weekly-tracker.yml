name: Weekly Tea Research Tracker

on:
  schedule:
    # GitHub Actions 使用 UTC；01:00 UTC = 北京/新加坡时间周一 09:00
    - cron: "0 1 * * 1"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: weekly-tea-research-tracker
  cancel-in-progress: false

jobs:
  generate-weekly-report:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      TZ: Asia/Shanghai
      PYTHONUTF8: "1"
      CONTACT_EMAIL: ${{ secrets.CONTACT_EMAIL }}
      NCBI_API_KEY: ${{ secrets.NCBI_API_KEY }}
      S2_API_KEY: ${{ secrets.S2_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt

      - name: Run offline smoke tests
        run: python -m unittest discover -s tests -v

      - name: Generate weekly report
        run: python main.py

      - name: Commit new report
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/
          if git diff --cached --quiet; then
            echo "No report changes to commit."
          else
            git commit -m "chore: add weekly tea research report $(date +%F)"
            git push
          fi
